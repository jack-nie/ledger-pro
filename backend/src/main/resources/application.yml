server:
  port: 8080

spring:
  application:
    name: ledger-pro-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ledger_pro?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 15m
      cache-null-values: false
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173
  auth:
    token-ttl-hours: 168
